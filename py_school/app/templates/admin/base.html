<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin Panel{% endblock %} - Denov2School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="/static/css/admin-style.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand text-warning fw-bold" href="/admin/dashboard">
                <i class="fas fa-shield-alt me-2"></i>Admin Panel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/news"><i class="fas fa-newspaper me-1"></i> Yangiliklar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/departments"><i class="fas fa-layer-group me-1"></i> Bo'limlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/teachers"><i class="fas fa-chalkboard-teacher me-1"></i> Ustozlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/messages"><i class="fas fa-envelope me-1"></i> Xabarlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/sitesettings"><i class="fas fa-cogs me-1"></i> Sozlamalar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/content"><i class="fas fa-language me-1"></i> Sayt matnlari</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="/" class="btn btn-outline-light btn-sm me-3" target="_blank">
                        <i class="fas fa-external-link-alt me-1"></i> Saytga o'tish
                    </a>
                    <div class="dropdown">
                        <button class="btn btn-dark dropdown-toggle border" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i> Admin
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/admin/account/changepassword"><i class="fas fa-key me-2"></i> Parolni o'zgartirish</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form action="/admin/logout" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger"><i class="fas fa-sign-out-alt me-2"></i> Chiqish</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
