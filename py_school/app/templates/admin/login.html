<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tizimga kirish - Tizim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { background-color: #f8f9fa; }
        .login-card { border-radius: 1rem; border: none; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary min-vh-100">

<main class="w-100 m-auto" style="max-width: 400px;">
    <div class="card login-card">
        <div class="card-body p-5 text-center">
            
            <div class="mb-4">
                <i class="fas fa-shield-alt text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3 fw-bold">Admin Panel</h3>
                <p class="text-muted small">Boshqaruv tizimiga kirish</p>
            </div>

            {% if error %}
            <div class="alert alert-danger text-start small p-2">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/admin/login">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="UserName" name="user_name" placeholder="Foydalanuvchi nomi" required>
                    <label for="UserName">Foydalanuvchi nomi</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="Password" name="password" placeholder="Parol" required>
                    <label for="Password">Parol</label>
                </div>

                <div class="mb-4 text-start text-muted small">
                    Faqat administrator uchun kirish oynasi.
                </div>

                <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">
                    Kirish <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>
            
            <div class="mt-4 pt-3 border-top pb-0 mb-0">
                <a href="/" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Saytga qaytish</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
