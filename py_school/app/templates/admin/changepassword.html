{% extends "admin/base.html" %}

{% block title %}Parolni O'zgartirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-header bg-white border-bottom py-3">
                <h4 class="mb-0 fw-bold"><i class="fas fa-key text-warning me-2"></i> Parolni O'zgartirish</h4>
            </div>
            <div class="card-body p-4">
                {% if success %}
                <div class="alert alert-success">{{ success }}</div>
                {% endif %}
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form action="/admin/account/changepassword" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Eski Parol</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Yangi Parol</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold">O'zgartirish</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
